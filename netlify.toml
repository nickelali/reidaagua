[[redirects]]
  from = "/admin"
  to   = "/admin.html"
  status = 200

[[redirects]]
  from = "/driver"
  to   = "/driver.html"
  status = 200

[[redirects]]
  from = "/login"
  to   = "/login.html"
  status = 200

[build]
  command = "bash build.sh"
  publish = "."

[build.environment]
  NODE_VERSION = "18"
