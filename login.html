<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acesso Administrativo — Rei da Água</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --azul:    #005fa3;
      --azul-dk: #004880;
      --branco:  #ffffff;
      --cinza:   #f5f7fa;
      --texto:   #1a1a2e;
      --erro:    #dc2626;
      --sombra:  0 8px 32px rgba(0,95,163,.18);
    }

    body {
      font-family: 'Open Sans', sans-serif;
      background: linear-gradient(135deg, #005fa3 0%, #003d6b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .login-card {
      background: var(--branco);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--sombra);
      animation: slideUp .4s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-logo {
      display: block;
      max-height: 60px;
      margin: 0 auto 1.5rem;
      object-fit: contain;
    }

    .login-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--texto);
      text-align: center;
      margin-bottom: .25rem;
    }

    .login-subtitle {
      font-size: .875rem;
      color: #64748b;
      text-align: center;
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: .875rem;
      font-weight: 600;
      color: var(--texto);
      margin-bottom: .4rem;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: .75rem 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      transition: border-color .2s;
      background: var(--cinza);
      color: var(--texto);
    }

    input:focus {
      outline: none;
      border-color: var(--azul);
      background: var(--branco);
    }

    .btn-login {
      width: 100%;
      padding: .875rem;
      background: var(--azul);
      color: var(--branco);
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer;
      transition: background .2s, transform .1s;
      margin-top: .5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
    }

    .btn-login:hover { background: var(--azul-dk); }
    .btn-login:active { transform: scale(.98); }
    .btn-login:disabled { background: #94a3b8; cursor: not-allowed; }

    .spinner {
      width: 18px; height: 18px;
      border: 3px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-text { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: var(--erro);
      border-radius: 8px;
      padding: .75rem 1rem;
      font-size: .875rem;
      margin-top: 1rem;
      display: none;
      align-items: center;
      gap: .5rem;
    }
    .error-msg.show { display: flex; }

    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: .8rem;
      color: #94a3b8;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      color: var(--azul);
      text-decoration: none;
      font-size: .875rem;
      font-weight: 600;
      margin-top: 1rem;
      transition: color .2s;
    }
    .back-link:hover { color: var(--azul-dk); }
  </style>
</head>
<body>

  <div class="login-card">
    <img src="assets/logo.jpg" alt="Rei da Água" class="login-logo" />

    <h1 class="login-title">Área Restrita</h1>
    <p class="login-subtitle">Painel Admin &amp; Entregadores</p>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="login-email">E-mail</label>
        <input
          type="email"
          id="login-email"
          placeholder="seu@email.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label for="login-password">Senha</label>
        <input
          type="password"
          id="login-password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <button type="submit" class="btn-login" id="btn-login">
        <div class="spinner"></div>
        <span class="btn-text">
          <i class="fa-solid fa-right-to-bracket"></i> Entrar
        </span>
      </button>

      <div class="error-msg" id="error-msg" role="alert">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span id="error-text">E-mail ou senha inválidos.</span>
      </div>
    </form>

    <div style="text-align:center; margin-top: 1.25rem;">
      <a href="index.html" class="back-link">
        <i class="fa-solid fa-arrow-left"></i> Voltar ao site
      </a>
    </div>

    <p class="login-footer">Rei da Água &copy; <span id="ano"></span></p>
  </div>

  <script src="js/config.js"></script>
  <script type="module">
    import { login, getUserProfile } from './js/auth.js';

    document.getElementById('ano').textContent = new Date().getFullYear();

    const form    = document.getElementById('login-form');
    const btn     = document.getElementById('btn-login');
    const errDiv  = document.getElementById('error-msg');
    const errText = document.getElementById('error-text');

    function showError(msg) {
      errText.textContent = msg;
      errDiv.classList.add('show');
    }

    function hideError() {
      errDiv.classList.remove('show');
    }

    function setLoading(loading) {
      btn.disabled = loading;
      btn.classList.toggle('loading', loading);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      if (!email || !password) {
        showError('Preencha e-mail e senha.');
        return;
      }

      setLoading(true);

      try {
        await login(email, password);
        const profile = await getUserProfile();

        if (!profile) {
          showError('Perfil não encontrado. Contate o administrador.');
          setLoading(false);
          return;
        }

        // Redireciona por role
        if (profile.role === 'admin') {
          window.location.href = '/admin.html';
        } else if (profile.role === 'driver') {
          window.location.href = '/driver.html';
        } else {
          showError('Acesso não autorizado.');
          setLoading(false);
        }
      } catch (err) {
        const msg = err?.message?.toLowerCase() || '';
        if (msg.includes('invalid') || msg.includes('credentials')) {
          showError('E-mail ou senha inválidos.');
        } else if (msg.includes('network') || msg.includes('fetch')) {
          showError('Sem conexão. Verifique sua internet.');
        } else {
          showError('Erro ao fazer login. Tente novamente.');
        }
        setLoading(false);
      }
    });
  </script>
</body>
</html>
